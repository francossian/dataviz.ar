    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script>
      // ═══════════════════════════════════════════════════════
      // CONTENT
      // All user-facing strings live here.
      // ✏️  To add multilingual support in the future, wrap this
      //     in a translations object with "en" / "es" keys.
      // ═══════════════════════════════════════════════════════
      const content = {
        // ── Your name as typed out on screen ──
        name: "Franco Guiragossian",

        // ── Roles cycled in the animated morph ──
        // ADD / REMOVE / REORDER here freely.
        // Keep them short (≤ 30 chars) for mobile.
        roles: [
          "Data analysis",
          "Dashboard development",
          "Data visualization",
          "Survey design",
        ],

        // ── Tagline shown below the role morph ──
        // ✏️  Update to reflect your core services / skills.
        tagline:
          "Data analysis · Dashboard development · Data visualization · Survey design",

        // ── CTA button labels ──
        cta_portfolio: "View portfolio",
        cta_about: "About me",

        // ── Footer ──
        footer: "© 2026 Franco Guiragossian · dataviz.ar",
      };

      // Convenience helper — use t('key') anywhere
      function t(key) {
        return content[key];
      }

      // Apply static strings to the DOM, then kick off animations
      document.getElementById("hero-tagline").textContent = t("tagline");
      document.getElementById("cta-portfolio").textContent = t("cta_portfolio");
      document.getElementById("cta-about").textContent = t("cta_about");
      document.getElementById("footer-copy").textContent = t("footer");

      // Start typewriter immediately
      typewriterName();

      // ─────────────────────────────────────────
      // 1. PARTICLE NETWORK BACKGROUND
      //    Draws nodes + edges on a <canvas>.
      //    Each node drifts slowly; edges appear
      //    when two nodes are close enough.
      //    Mouse proximity pulls nearby nodes.
      // ─────────────────────────────────────────
      (function initParticles() {
        const canvas = document.getElementById("particle-canvas");
        const ctx = canvas.getContext("2d");

        // Resize canvas to fill the hero section
        function resize() {
          canvas.width = canvas.offsetWidth;
          canvas.height = canvas.offsetHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        const COUNT = 60; // number of nodes
        const LINK_DIST = 130; // max distance to draw an edge
        const SPEED = 0.4; // base drift speed
        const NODE_COLOR = "rgba(0, 173, 181, 0.6)"; // teal

        // Track mouse position to attract nearby nodes
        let mouse = { x: -999, y: -999 };
        canvas.addEventListener("mousemove", (e) => {
          const rect = canvas.getBoundingClientRect();
          mouse.x = e.clientX - rect.left;
          mouse.y = e.clientY - rect.top;
        });
        canvas.addEventListener("mouseleave", () => {
          mouse = { x: -999, y: -999 };
        });

        // Initialise nodes at random positions with random velocities
        const nodes = Array.from({ length: COUNT }, () => ({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: (Math.random() - 0.5) * SPEED,
          vy: (Math.random() - 0.5) * SPEED,
          r: Math.random() * 2 + 1.5, // radius 1.5–3.5 px
        }));

        function tick() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          // Move each node, bounce off walls
          for (const n of nodes) {
            // Subtle mouse attraction — nodes within 120 px nudge toward cursor
            const dx = mouse.x - n.x;
            const dy = mouse.y - n.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 120) {
              n.vx += (dx / dist) * 0.03;
              n.vy += (dy / dist) * 0.03;
            }

            // Clamp speed so attraction never makes things frantic
            const speed = Math.sqrt(n.vx * n.vx + n.vy * n.vy);
            if (speed > SPEED * 3) {
              n.vx = (n.vx / speed) * SPEED * 3;
              n.vy = (n.vy / speed) * SPEED * 3;
            }

            n.x += n.vx;
            n.y += n.vy;

            if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
            if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
          }

          // Draw edges between close-enough node pairs
          for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
              const dx = nodes[i].x - nodes[j].x;
              const dy = nodes[i].y - nodes[j].y;
              const d = Math.sqrt(dx * dx + dy * dy);
              if (d < LINK_DIST) {
                // Fade edge opacity with distance
                const alpha = (1 - d / LINK_DIST) * 0.4;
                ctx.strokeStyle = `rgba(0, 173, 181, ${alpha})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(nodes[i].x, nodes[i].y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                ctx.stroke();
              }
            }
          }

          // Draw nodes on top of edges
          for (const n of nodes) {
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
            ctx.fillStyle = NODE_COLOR;
            ctx.fill();
          }

          requestAnimationFrame(tick);
        }

        tick();
      })();

      // ─────────────────────────────────────────
      // 2. TYPEWRITER — hero name
      //    Types out the name one character at a
      //    time, then triggers the role morph.
      // ─────────────────────────────────────────
      function typewriterName() {
        const el = document.getElementById("hero-name");
        const text = t("name");
        let i = 0;

        function type() {
          if (i <= text.length) {
            el.textContent = text.slice(0, i);
            i++;
            setTimeout(type, 70); // ms per character — adjust to taste
          } else {
            // Name done → start role morph after a short pause
            setTimeout(startRoleMorph, 400);
          }
        }

        // Small delay before typing begins so the page has settled
        setTimeout(type, 600);
      }

      // ─────────────────────────────────────────
      // 3. ROLE MORPH
      //    Cycles through content.roles.
      //    Each string is typed out, held, then
      //    deleted before the next one is typed.
      //
      //    ✏️  Edit the roles list in the translations
      //    object above — don't change anything here.
      // ─────────────────────────────────────────
      function startRoleMorph() {
        const el = document.getElementById("hero-role");
        const tagline = document.getElementById("hero-tagline");
        const roles = t("roles"); // pulls from translations[lang].roles

        let roleIndex = 0;
        let charIndex = 0;
        let deleting = false;

        const TYPE_SPEED = 60; // ms per char when typing
        const DELETE_SPEED = 35; // ms per char when deleting
        const HOLD_TIME = 1800; // ms to hold full string before deleting

        // Fade in the tagline once the role morph starts
        tagline.style.opacity = "1";

        function morph() {
          const current = roles[roleIndex];

          if (!deleting) {
            el.textContent = current.slice(0, charIndex + 1);
            charIndex++;
            if (charIndex === current.length) {
              deleting = true;
              setTimeout(morph, HOLD_TIME);
              return;
            }
          } else {
            el.textContent = current.slice(0, charIndex - 1);
            charIndex--;
            if (charIndex === 0) {
              deleting = false;
              roleIndex = (roleIndex + 1) % roles.length;
            }
          }

          setTimeout(morph, deleting ? DELETE_SPEED : TYPE_SPEED);
        }

        morph();
      }
    </script>
