    <script>
      // ─────────────────────────────────────────
      // PARTICLE NETWORK BACKGROUND
      // ─────────────────────────────────────────
      (function initParticles() {
        const canvas = document.getElementById("particle-canvas");
        const ctx = canvas.getContext("2d");

        function resize() {
          canvas.width = canvas.offsetWidth;
          canvas.height = canvas.offsetHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        const COUNT = 60;
        const LINK_DIST = 130;
        const SPEED = 0.4;
        const NODE_COLOR = "rgba(117, 170, 219, 0.6)";

        let mouse = { x: -999, y: -999 };
        canvas.addEventListener("mousemove", (e) => {
          const rect = canvas.getBoundingClientRect();
          mouse.x = e.clientX - rect.left;
          mouse.y = e.clientY - rect.top;
        });
        canvas.addEventListener("mouseleave", () => {
          mouse = { x: -999, y: -999 };
        });

        const nodes = Array.from({ length: COUNT }, () => ({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: (Math.random() - 0.5) * SPEED,
          vy: (Math.random() - 0.5) * SPEED,
          r: Math.random() * 2 + 1.5,
        }));

        function tick() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (const n of nodes) {
            const dx = mouse.x - n.x,
              dy = mouse.y - n.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 120) {
              n.vx += (dx / dist) * 0.03;
              n.vy += (dy / dist) * 0.03;
            }
            const speed = Math.sqrt(n.vx * n.vx + n.vy * n.vy);
            if (speed > SPEED * 3) {
              n.vx = (n.vx / speed) * SPEED * 3;
              n.vy = (n.vy / speed) * SPEED * 3;
            }
            n.x += n.vx;
            n.y += n.vy;
            if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
            if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
          }
          for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
              const dx = nodes[i].x - nodes[j].x,
                dy = nodes[i].y - nodes[j].y;
              const d = Math.sqrt(dx * dx + dy * dy);
              if (d < LINK_DIST) {
                ctx.strokeStyle = `rgba(117, 170, 219, ${(1 - d / LINK_DIST) * 0.4})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(nodes[i].x, nodes[i].y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                ctx.stroke();
              }
            }
          }
          for (const n of nodes) {
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
            ctx.fillStyle = NODE_COLOR;
            ctx.fill();
          }
          requestAnimationFrame(tick);
        }
        tick();
      })();
      // Toggle salmon color on individual logo dots when clicked
      document.querySelectorAll(".logo-dot").forEach((dot) => {
        dot.addEventListener("click", () => dot.classList.toggle("clicked"));
